volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-test-f2b07d09
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-test-f2b07d09
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453097
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://05dea861d431fb0db4c136c8a22d55a7e092e5e5786ad397c9b43044c59a5f3c7fb1bd13bed234d9d664b3a56e6838ddfa254bcad5c5c85bf885f2bf44a2ed36@57.130.15.24:46108,enode://e725ad2899e106b3d819c50a9e604494d2c2ead928ecd08c45e661f9811f1ced15d86a3091adf4c9cfaf469652f4ed2e2325e83aa49d2b7f3c50ebb03aac37f8@57.130.8.112:46110,enode://4ea2f8a830f5ebc2612e3e68567cb57ba8b9884aa4996a44176d23792ee6801a7b76e51f0d2037d4a14ced4f402fbfddad1a2b4066b1173873ffb238763cc0ab@57.130.9.134:46112,enode://45d886de2bb3e2441a8cc64c7da59901ecef198435636178079ff1a9ba66665a9e646640fd061139c66511e8ee6b7151ae2f7b29e3cdb9df48bb58127b8bac35@57.130.8.174:46114,enode://7cf96f4721ca89572908bd49d933fca6c49199b6809c36c3e4b80ce9cd09af9b7c134c175a1b8098a1effbcd800c7714317856e0e5079ada6dc5acacd2a05795@57.130.8.167:46116
