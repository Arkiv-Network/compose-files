volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-test-2896d95a
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-test-2896d95a
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453095
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://ee50e827bf7258ea10db68bf43b8e9e13cabc832f2cdeb2bf39a7448b6eed206f4e0dfe3777ffbdb6b8d04501660880329b8599a87277c2868dabcc5c8b5dfa9@57.130.8.174:46108,enode://49d5822c5bdb0256b8fed4a4d373172d164aecf64fe8bfb93f10b2c720d7f5830019afd0e2ea75a213b323418c8844196b41919151ba3e84191121196c187dfd@57.130.8.252:46110,enode://8e8eb07b2be11ccfbf4bb88fe72b467d0702dc907e81d209de11f6c16dbd1ee9faff947533fe60ce598718e0a02bc9a9e14760d6109a1f3b8c90f0b83d763d12@57.130.8.167:46112,enode://5d6bb71dd14eb2dc3a6d1ce409f24f354950441caa727dc7bed0741c50c568d27deb7da2bdd14870fc74ab07fb2b65b161cd6635a073f824b66904c1b65e5636@57.130.15.24:46114,enode://bb0b2cda9408b7a47236c16ce237027bad4c66d69d2c21beadc0743186776fe8550e32cf78fda8b1f2261090e2c834059fbcad29dcf2f519cf4140de3079e4ee@57.130.9.134:46116
