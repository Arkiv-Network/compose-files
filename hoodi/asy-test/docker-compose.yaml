volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-test-5570a98b
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-test-5570a98b
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453098
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://d06cbf376fec6919be67aad9acd703314f4f9dce070f0dfc9ac41f18e541ea0bd8a0fc5588880d299ecb9205b179aede7484e8760ba7e1e718a93faaa98f325f@57.130.9.134:46096,enode://c7df6495443d1eba081d81b12bae1c2d36c33d57c3c4735df1bbca82f5942f6e917c0c07235506763fcac2c9ae3d37e74a31fbc32555248f4cfd5cf161c03fc0@57.130.8.167:46098,enode://f3d931fbdfe4910b788bc9a194dbfbeed8659bc3db0aa7ef003d73ade2e5bf6ebe0e391f31b820560244497b3fb11fb95cb3850c80de83e7d5c760e061b0ecd6@57.130.8.167:46100,enode://d33a6a3160897e0ddab669449529154c79f67a168e6829dd1b9740a4e7657998608c221a86be3ca528d4e367eda2761ade00126b87b77810681b258737f3e4c1@57.130.8.252:46102,enode://3cda3c7226086767f4894114affcd3560cd70905d0e20b6a8ae5c445e77b2817c8f09025accabd0b0505fe1f29ade3541660d658a58ca7d7d8654af6117c9521@57.130.8.174:46104
