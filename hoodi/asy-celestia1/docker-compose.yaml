volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-celestia1-5ab1dc09
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-celestia1-5ab1dc09
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453094
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://12d8c9cdfcb5cf48339efe2c6676d22239c12936fb7c55c7f331f7ea10b1e0a2092c612edbadcbdbf7a62fec24eca3ec8daba7c9c4344567f90e13aa747cd63a@57.130.9.134:46120,enode://3b6830ee94ef2ff994bfbd6d166d299660f663c0d9fbc2836d01d757bb11dcb04c8162b32d3ea7fa46a2f6cae2200cbedb82fc39045ce210e70b37787ca0d1f7@57.130.8.252:46122,enode://57273145afdf3610738e18f26226b5fd134624a6df6120d5609068109cc8d2a59c66d32f787c2cc173fc4fef49f8f6d023c447cacb7537b32d190665c3d118ae@57.130.8.174:46124,enode://5de2529b1d83a35b589925f60ed7fcd8fe1295cfd2e2abb2097c4b46c3a4285ee9f5ab1933f274c40ab3c86a867660a976ec6c8aaca957bc54bb23c36f7a4437@57.130.8.167:46126,enode://4eada0763eae83155d1979fd92eaabab96719482926bf33ce8ab5d809cafd3b78e188ade676ad1f8dec6e3f1d73fa59b08d52c3abcd188cc1e069280ae23c92b@57.130.15.24:46128
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-asy-celestia1-ae5fb1f2
    restart: unless-stopped
