volumes:
    op_geth_data:
    op_node_data:
    jwt_shared:
services:
    # ========================================
    # OPTIMISM NODE SERVICES
    # ========================================
    op-init:
        image: alpine:latest
        command:
            - sh
            - -c
            - |
              set -e

              # Create config directory
              mkdir -p /config

              # Generate JWT secret if it doesn't exist
              if [ ! -f '/jwt/jwt' ]; then
                echo 'Generating JWT secret'
                mkdir -p /jwt
                # Generate a 32-byte random hex string for JWT secret
                apk add --no-cache openssl
                openssl rand -hex 32 > /jwt/jwt
                chmod 666 /jwt/jwt
                echo 'JWT secret generated successfully'
              else
                echo 'JWT secret already exists, skipping generation'
              fi
        volumes:
            - op_node_data:/op-node
            - jwt_shared:/jwt
    op-geth-init:
        image: golemnetwork/golembase-l3-op-geth:v1.101603.3-2.0-hoodi-test-asy-lm1-3f55aeec
        depends_on:
            op-init:
                condition: service_completed_successfully
        entrypoint: []
        command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f '/geth/geth' ]; then
                echo 'Initializing geth data directory with genesis block...'

                # Use genesis file from op-init
                if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
                  echo 'ERROR: Failed to initialize geth with genesis block'
                  exit 1
                fi
                echo 'Geth initialized successfully with genesis block'
              else
                echo 'Geth data directory already initialized, skipping initialization'
              fi
        volumes:
            - op_geth_data:/geth
    op-geth:
        image: golemnetwork/golembase-l3-op-geth:v1.101603.3-2.0-hoodi-test-asy-lm1-3f55aeec
        restart: unless-stopped
        stop_grace_period: 5m
        depends_on:
            op-geth-init:
                condition: service_completed_successfully
        command:
            - --networkid=5
            - --datadir=/geth
            - --http
            - --http.corsdomain=*
            - --http.vhosts=*
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.origins=*
            - --ws.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --syncmode=snap
            - --authrpc.vhosts=*
            - --authrpc.addr=0.0.0.0
            - --authrpc.port=8551
            - --authrpc.jwtsecret=/jwt/jwt
            - --usb=false
            - --state.scheme=hash
            - --nat=none
            - --bootnodes=enode://2415e2fde51004fca91f32f7c3b2fc2c51b8a49c8eb262d7b60afc2d954c4f76dc7cbfd11c9ea34b2fb30cc78c17576ac6deda42e635c1ff21643394a719fb9c@49.13.30.29:30012,enode://7682ddf53445f8f86a67232b3849f11593768e37de7ceebab45b4286dd8d1e19d764cb05f20e550b6332e4a2d725cc52d72dc127c67d306372baf29873736e8e@195.201.165.105:30014,enode://3f3f537e3e6d03770216f8f5118ab85d3ef69f3b06221fce594482d606805aefac1afd8545f76b4b772d44f38606559aa25cb9183a3470388a5b560a47865172@195.201.165.105:30016,enode://1e663bb1d5d533221b3903248ae871c97b666eff77d182fafb4f51057ba2d79c05a34d168f975f7c12b60f5aca0686eb2ab61fc1ad29277dacaf9ffcc57d5dad@91.99.94.10:30018,enode://36afc4f66021ee402eea9de4b973119a83e3a4109e3c6ecd8ed2c6b0f0c5d9830195423a699e16dc589c5907848695557688f811abd0e8877147a0f3db85a34a@91.99.184.248:30020
            - --txpool.disable.non.golembase.transactions=true
        ports:
            - 8545:8545
            - 8546:8546
        volumes:
            - op_geth_data:/geth
            - jwt_shared:/jwt
    op-node:
