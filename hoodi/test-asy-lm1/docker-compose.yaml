volumes:
    op_geth_data:
    op_node_data:
    jwt_shared:
services:
    # ========================================
    # OPTIMISM NODE SERVICES
    # ========================================
    op-init:
        image: alpine:latest
        command:
            - sh
            - -c
            - |
              set -e

              # Create config directory
              mkdir -p /config

              # Generate JWT secret if it doesn't exist
              if [ ! -f '/jwt/jwt' ]; then
                echo 'Generating JWT secret'
                mkdir -p /jwt
                # Generate a 32-byte random hex string for JWT secret
                apk add --no-cache openssl
                openssl rand -hex 32 > /jwt/jwt
                chmod 666 /jwt/jwt
                echo 'JWT secret generated successfully'
              else
                echo 'JWT secret already exists, skipping generation'
              fi
        volumes:
            - op_node_data:/op-node
            - jwt_shared:/jwt
    op-geth-init:
        image: golemnetwork/golembase-l3-op-geth:v1.101603.3-2.0-hoodi-test-asy-lm1-99e5409e
        depends_on:
            op-init:
                condition: service_completed_successfully
        entrypoint: []
        command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f '/geth/geth' ]; then
                echo 'Initializing geth data directory with genesis block...'

                # Use genesis file from op-init
                if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
                  echo 'ERROR: Failed to initialize geth with genesis block'
                  exit 1
                fi
                echo 'Geth initialized successfully with genesis block'
              else
                echo 'Geth data directory already initialized, skipping initialization'
              fi
        volumes:
            - op_geth_data:/geth
    op-geth:
        image: golemnetwork/golembase-l3-op-geth:v1.101603.3-2.0-hoodi-test-asy-lm1-99e5409e
        restart: unless-stopped
        stop_grace_period: 5m
        depends_on:
            op-geth-init:
                condition: service_completed_successfully
        command:
            - --networkid=5
            - --datadir=/geth
            - --http
            - --http.corsdomain=*
            - --http.vhosts=*
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.origins=*
            - --ws.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --syncmode=snap
            - --authrpc.vhosts=*
            - --authrpc.addr=0.0.0.0
            - --authrpc.port=8551
            - --authrpc.jwtsecret=/jwt/jwt
            - --usb=false
            - --state.scheme=hash
            - --nat=none
            - --bootnodes=enode://aa9f517c85746f73b1e1e6fe28fae93c264435e5e463593dec523bab3b4e1eeeaafdab5fd66381866218357a13b55c818606a93de8a17250a1ad5b3e8e4bb046@91.99.184.248:30012,enode://06c63311c12a006de23f119e8cb39ceb235e909f3b7146a5967c266822fcd7a08259767102d64c3aaaa8fdc045cef7db50051330a2ed59bcf6470ffb218cf359@49.13.30.29:30014,enode://4ba5a9682aea66099fbc434ad93aabb05cd5dbe7978e5388fa7d0b1d0056d2f5cbeef7390b558bed0349fe8a3fd6825bafae0a98356ff87834c5a5e42cb06134@195.201.165.105:30016,enode://634f05d25990d435ce072803fa2c7b4c286522ac2b5172c4d01ff62111bfea061f2d5f104e9a0fd55aedbccb1b73983123eab695ed736a54e13f8daa621e7aeb@91.99.94.10:30018,enode://87270858193f74d4a5fd7d1335e7fd3ad039b570281bc12add82012c1fb4fb05c9364e6ae17e5eede1794722dd2aeb50402ed208547f10467b44fe06a879bfe8@91.99.184.248:30020
            - --txpool.disable.non.golembase.transactions=true
        ports:
            - 8545:8545
            - 8546:8546
        volumes:
            - op_geth_data:/geth
            - jwt_shared:/jwt
    op-node:
        image: golemnetwork/golembase-l3-op-node:v1.16.0-hoodi-test-asy-lm1-cdaf19c2
