volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-faucet-test-1-74c853c9
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-faucet-test-1-74c853c9
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=15
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://883f0042a36f635284eab5282d57462fc080b7cd10cc2fe0de13e47474a246d5e6116a9a3abe64ea46284ad3b91a72a08278935d43f7a654173d51bc8566bbb9@195.201.165.105:30084,enode://e04c10438a21eed1ebab7c0e932fc1a75496af465296649a69ac1acd309f65334528eb0474c2f43007f5d88d8276f58cb44fd15e128f9c7340fb01a2da112008@195.201.165.105:30086,enode://a70dc4f32c2cdef183c5ee0a2753b0ab3a83169eded4da343cb95470bc7d9ae84348d3e737d56d8509dbe5f9db9eba81ffd4e205e8ca2d941dba5d4f1601eea2@195.201.165.105:30088,enode://9c790fd9e10d6204e03df645b70813ae994ccdd5fe246016216f655f5c3e760e97a40e88e3d2f4b8984bbe9cda583d6ee12c544c299aafaa26fa97c0bed6bcd3@195.201.165.105:30090,enode://ea89858823617283c3d799a7693482430b22ba326c696f896f0a4dc2933c6f24facf26d57a83cf40fb74460908870f8bd0d9228f3fb0c1e05b05db0ed6ad81c3@195.201.165.105:30092
