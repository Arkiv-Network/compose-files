volumes:
    op_geth_data:
    op_node_data:
    jwt_shared:
services:
    # ========================================
    # OPTIMISM NODE SERVICES
    # ========================================
    op-init:
        image: alpine:latest
        command:
            - sh
            - -c
            - |
              set -e

              # Create config directory
              mkdir -p /config

              # Generate JWT secret if it doesn't exist
              if [ ! -f '/jwt/jwt' ]; then
                echo 'Generating JWT secret'
                mkdir -p /jwt
                # Generate a 32-byte random hex string for JWT secret
                apk add --no-cache openssl
                openssl rand -hex 32 > /jwt/jwt
                chmod 666 /jwt/jwt
                echo 'JWT secret generated successfully'
              else
                echo 'JWT secret already exists, skipping generation'
              fi
        volumes:
            - op_node_data:/op-node
            - jwt_shared:/jwt
    op-geth-init:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-hoodi-asy-celestia-4110de26
        depends_on:
            op-init:
                condition: service_completed_successfully
        entrypoint: []
        command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f '/geth/geth' ]; then
                echo 'Initializing geth data directory with genesis block...'

                # Use genesis file from op-init
                if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
                  echo 'ERROR: Failed to initialize geth with genesis block'
                  exit 1
                fi
                echo 'Geth initialized successfully with genesis block'
              else
                echo 'Geth data directory already initialized, skipping initialization'
              fi
        volumes:
            - op_geth_data:/geth
    op-geth:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-hoodi-asy-celestia-4110de26
        restart: unless-stopped
        stop_grace_period: 5m
        depends_on:
            op-geth-init:
                condition: service_completed_successfully
        command:
            - --networkid=60138453093
            - --datadir=/geth
            - --http
            - --http.corsdomain=*
            - --http.vhosts=*
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.origins=*
            - --ws.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --syncmode=snap
            - --authrpc.vhosts=*
            - --authrpc.addr=0.0.0.0
            - --authrpc.port=8551
            - --authrpc.jwtsecret=/jwt/jwt
            - --usb=false
            - --state.scheme=hash
            - --nat=none
            - --bootnodes=enode://2d5e5952f7c0f79d063f15042c024420f525190305b6caf5da9540e1ae23c02a63d0e403618835a09354fb39a69d4218bd7b059a58da042a2cfa5ffe539adcdd@57.130.8.252:46108,enode://62f7bc5e2bcc5a27e30c9c3c5f9f9eb74166c378765f6323821e6ac6b48186db88c3f328e0603d4da13a9f1d17eb9e5216ad7646820bced6c7eb0c889d8d4cc6@57.130.8.167:46110,enode://9acde23015d3a4fa3a579a35cfe807f3a735856f6bf5346cde76af1f0534b2eb7a7937c5065237ea7a60b0c39a93865d8d1030565c87aa521c66600420a4b94d@57.130.8.112:46112,enode://6ab092b6a2de9af199ee2fab8143819d5fd45e0729f5257043ef63f960ca6fd23fb70f0fd3e16cfe0f30924132000bba00777611fd7d86aad5452f31775d2cd1@57.130.9.134:46114,enode://3c898d279936a04110b461277077c990d43798fd37f1587b4f288b48116696429d3e9c4ec49362989a61fce0ad5adfa858c29a34ff25a2baff39f400c686272c@57.130.15.24:46116
            - --txpool.disable.non.golembase.transactions=true
        ports:
            - 8545:8545
            - 8546:8546
        volumes:
            - op_geth_data:/geth
            - jwt_shared:/jwt
    op-node:
