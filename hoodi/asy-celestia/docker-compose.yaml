volumes:
    op_geth_data:
    op_node_data:
    jwt_shared:
services:
    # ========================================
    # OPTIMISM NODE SERVICES
    # ========================================
    op-init:
        image: alpine:latest
        command:
            - sh
            - -c
            - |
              set -e

              # Create config directory
              mkdir -p /config

              # Generate JWT secret if it doesn't exist
              if [ ! -f '/jwt/jwt' ]; then
                echo 'Generating JWT secret'
                mkdir -p /jwt
                # Generate a 32-byte random hex string for JWT secret
                apk add --no-cache openssl
                openssl rand -hex 32 > /jwt/jwt
                chmod 666 /jwt/jwt
                echo 'JWT secret generated successfully'
              else
                echo 'JWT secret already exists, skipping generation'
              fi
        volumes:
            - op_node_data:/op-node
            - jwt_shared:/jwt
    op-geth-init:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-hoodi-asy-celestia-436e6663
        depends_on:
            op-init:
                condition: service_completed_successfully
        entrypoint: []
        command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f '/geth/geth' ]; then
                echo 'Initializing geth data directory with genesis block...'

                # Use genesis file from op-init
                if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
                  echo 'ERROR: Failed to initialize geth with genesis block'
                  exit 1
                fi
                echo 'Geth initialized successfully with genesis block'
              else
                echo 'Geth data directory already initialized, skipping initialization'
              fi
        volumes:
            - op_geth_data:/geth
    op-geth:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-hoodi-asy-celestia-436e6663
        restart: unless-stopped
        stop_grace_period: 5m
        depends_on:
            op-geth-init:
                condition: service_completed_successfully
        command:
            - --networkid=60138453093
            - --datadir=/geth
            - --http
            - --http.corsdomain=*
            - --http.vhosts=*
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.origins=*
            - --ws.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --syncmode=snap
            - --authrpc.vhosts=*
            - --authrpc.addr=0.0.0.0
            - --authrpc.port=8551
            - --authrpc.jwtsecret=/jwt/jwt
            - --usb=false
            - --state.scheme=hash
            - --nat=none
            - --bootnodes=enode://b11f1d30051d83c79b9027fd8fca0af1634ffd3b45086215de86e952e599ed2d5c46115af37142141511b91b432d8e1c6b2c6041a29221f71e9e83391bf48abd@57.130.9.134:46120,enode://a198c12fe843b441c034b39a13e6cd8b2648b4665f9ee579d4fd188fa260d51b1334ceef49e6836a79b0929c56e0388e06a5dc01e1f421ae26fbb5e84b1f978a@57.130.8.167:46122,enode://2b1629b7a2028252532599ef76c6155674dcb5a19739ca11bcf3af6019c8d311df92757c5619af021da38dbf1fef11c56e6eaab07b7caf89e8f68f96ab0d62e5@57.130.15.24:46124,enode://fb58c743b6d3c8a0d02b667c46ff82c7f66a9a0ec3595afa1b2d6c46840147ea4b909f23ec98fff518ee781d46184d3727b4c2aa8d084ed016261b157fd35e3f@57.130.8.174:46126,enode://6b7d914d25e77854d6492d6fc89e8b62562490f9f0a6332756572bccbb84c5f778bd94430b3c067de85c7f2fe096b1d0dae26516859cdc71310b7d135007c65e@57.130.8.112:46128
