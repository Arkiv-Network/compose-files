volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-celestia-dabe52f2
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-celestia-dabe52f2
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453093
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://3ea8200476f3f30614f58baa9588b992a99bc71e8b2f3e0e1808de8d89813cad3bedafe2a432bec41c884a24aa3ebce65305d4e599fecd9aa56385cad7a441dd@57.130.8.167:46084,enode://437efab484f0ff367ffe0e2eed17c406f69c387851f07228762bee3176f8bcc7cb91e396e48041b888cf37c5d5a681494268ef637755a0bd133ae09954c81fbe@57.130.8.174:46086,enode://e9926164db177c1fb882fb4b2b824670e4ffd9f164ae80cf2fd05ed6bb3dc6d65f7a70f5776caa809c77cf9adf1cbf498c366ff7adf60fe1e409ce9ddfd267c5@57.130.8.252:46088,enode://302746722c8eb4302cb1866cc88b62f8be599a92acc1c8af856dfcca3ae411f77b8a6da5602e871bbda3fbc08176860c8520f09cb8f35ca7324d28bb0552cd2e@57.130.15.24:46090,enode://1877f24daf5a230858a0fed535f0d427dd8b7a9246baeb6573ebe3d499989feb2beb37b9550cb097e6de95d59836c83272e9f7191ba495436d196a4f8aebf6f0@57.130.8.167:46092
