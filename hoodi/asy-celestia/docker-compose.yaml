volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-celestia-0d52c1d7
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-celestia-0d52c1d7
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=16
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://1d1eb64bbd1a2bfe00a800f70ba5f2afa0504b014c40b4686111efbff032e9d8b69077d32066c228c9fb1908e680a34b6f40cd4fc98c516ba334d93d94ae34a8@195.201.165.105:30072,enode://c764ce49684cf2721f5882059b644448118930baee30e9ddd4345508c8fc8fbfa64f68baf368b5bf626add3744ac6403d4300f64c69f603f7ed8464b9ce5deae@195.201.165.105:30074,enode://6615658cfce658c4dcdb5924496ba104d3c4cedaaf0f9501bcaef1b76981ffb8789509ef13348230ac65ecab1b0e647e2d51a618f64b18eac7a79dc34b4392e6@195.201.165.105:30076,enode://ea3bd8688b8401eb608df382c13dc4e49161475a7e9f7bad360adfcafe3139a6716be1c8ed539c063f45b33cfee12e6e68226631d27dfaaec31a2546a18016ee@195.201.165.105:30078,enode://558eaba539e131a7fa51edd23f7a8825a091408bfcfaa265b7b9e20077590a94d30b5133555a945e650edbf6d0b85e4b8c0187aed22bfec816630926a5709814@195.201.165.105:30080
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-asy-celestia-7ccb6cc6
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
