volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-foo-7b901d97
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-foo-7b901d97
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=16
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://04f9ca05be60a4b7a7f8212dfcf417e0da572e6f79817bdbfc51ae73fdd4f4800e954c30a747f20402abcffea5d7bfca264ab9c8aaa3586d5b12c84e1712bde9@195.201.165.105:30060,enode://7f368339a471dfce0bcf5083e4095f304e947696b5d0959e4f1ddb77b614c1555be0a2b3b1516f436b4d70e180288e9cc441e8b158d6a6e7d6ac73d08e6e9293@195.201.165.105:30062,enode://eb1d4dc798f3610c6153fefe25341afaa0557f830b77a3e4c981dd37c0aa762fef1c70d30e946cd7ea0c2eeec3bef353694926f221db80c5d5920b03093e9cd2@195.201.165.105:30064,enode://94073e70f8365db0534370d15e7b1df422ab55f229fa1d37acdfca043a38ce2cd715b44720c756645036af80c1438f5b5079c3b7fbeaa37343644757a39c5c76@195.201.165.105:30066,enode://a1634d5f74068916d1147df1433c2988cae2d6f36c82ca0039ee0b5929b0ca5e2e6eb533ce60eb8deb84648c9eaf9afaf4025e8e14d3251ae2d6c7e414f65de1@195.201.165.105:30068
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-asy-foo-1795193a
    restart: unless-stopped
    stop_grace_period: 5m
