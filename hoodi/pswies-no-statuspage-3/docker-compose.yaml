volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-pswies-no-statuspage-3-45694567
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-pswies-no-statuspage-3-45694567
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=2274637598
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://5e783a2dedfaf92eabec9046b2ca143c7b71d232ee87adfe391e941c4ec287e4a545657b96017d414f49cfc2a5c03706dd153ae3e1f2c36b94439fd8632069c3@91.99.184.248:30108,enode://5ec790729c6bf18d375fcd684a4717f547743c2caf03abd389b6f957de0c7845750d793437ad98da08128af66e8e00861b96950d073ac09baf0d6ba00c89f6a4@195.201.165.105:30110,enode://9d352297aa828688f10a999444588de138301a05ec9b8cac8b9b1a7cc79cf6507317bbb52665c88f4289725967660045ec025b1b93b3597da86f88cdfa1d94e7@195.201.165.105:30112,enode://93762406230e61135315c83b63df9f2ffdeca5ba1f5a95439373ffcc9658cda5ac33ae41ff18ada6861233dcfe3968919333b05ff937ade7deb8d1f08f032cb1@195.201.165.105:30114,enode://ca51a8655e768924fade4f6bba381f776ffcea29add58e91941b358d04bd6d58865ae41b19b2105424711e418b9b7a689489f63343166219a47a6638f45e0fab@195.201.165.105:30116
