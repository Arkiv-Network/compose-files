volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-mc-pr-76-916458f3
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-mc-pr-76-916458f3
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453098
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://d92cfae7aeda12a50c7be248692868f28ffbfd2bdf2b7e09a0786b313bf19000fd676dac83773e928b436e0195bce1e0339b0432a1c95f19c8e804460c6d4b32@57.130.8.174:46096,enode://621e524b486182f67249409d0165323c4ebbfda7cd65e3a4c06273b4dfd963e4add6677d08028f24d21ae9bdd1fc777d14e80d9b2d63af9615361490d526736a@57.130.15.24:46098,enode://fe7f10596ba8ff60e02eb550b9b6d16a301cf75b0ae3b0c2d94b07fdfcc1f78d90d19e9ea9a1544fe287d50c392e49f140f130390498f2a8b44a58cf8170a017@57.130.9.134:46100,enode://1a794eff6483d63fbd2df686b0e329e7e5fa44b9ae31e4cfb931c411069c6cd2265520ce4f80a5afb21b92bb65759e2d577161ff256ca7ff47afa6f9813fefeb@57.130.8.252:46102,enode://84ebb89e38447bf625fa11f39f951c6ad20e119f9ce85d950f1fb341b77a6031f7179a275ab300dc191e1e489df2b06fd385a75216002380275bcf803d95f69c@57.130.8.167:46104
