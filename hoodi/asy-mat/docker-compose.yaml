volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-mat-2162e646
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-mat-2162e646
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=13
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://d70f83e6ba1367c21bf225bf8dcf4de3121e76c2dfcffeea09c135075f00c38434ca5b9171cb043363d924a651e29728b883b1a37ff55941b7defc7e69d64c49@195.201.165.105:30060,enode://9ec8486a6e068023d44903fb45cfb3c203f8b80241330fa016725129b725e802bc9a2ff548d3bb8718fe45d446f4c534aea01f56d7909b1c01140b6138e37326@195.201.165.105:30062,enode://9180e5198ff62a84034a7d6a999ca10be1d8e1ff9f8da939bb61ddaa83d9db4d45b6e98a1848d2ca80ed7ab9ca4b33069bd8ba00413ca28edcf0097cd210e1e0@195.201.165.105:30064,enode://11c1a23b6cbd6f70b469ca94ff23308773605a8d8b398ea78ff7c99c9156fd7e124f07adb61ad72e73869dad76fa5c3716623c3787bc7ec9b222f689a6617b9f@195.201.165.105:30066,enode://153dbfca089ebebdb315180a686ce6da5db277643b8c40952d66d56f905d953739318fa15915d6109c8de51050b3bc96a8f641da1c4d06f90050d329c982cb17@195.201.165.105:30068
