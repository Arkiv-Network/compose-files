volumes:
    op_geth_data:
    op_node_data:
    jwt_shared:
services:
    # ========================================
    # OPTIMISM NODE SERVICES
    # ========================================
    op-init:
        image: alpine:latest
        command:
            - sh
            - -c
            - |
              set -e

              # Create config directory
              mkdir -p /config

              # Generate JWT secret if it doesn't exist
              if [ ! -f '/jwt/jwt' ]; then
                echo 'Generating JWT secret'
                mkdir -p /jwt
                # Generate a 32-byte random hex string for JWT secret
                apk add --no-cache openssl
                openssl rand -hex 32 > /jwt/jwt
                chmod 666 /jwt/jwt
                echo 'JWT secret generated successfully'
              else
                echo 'JWT secret already exists, skipping generation'
              fi
        volumes:
            - op_node_data:/op-node
            - jwt_shared:/jwt
    op-geth-init:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-pebble-nobitemporality-test-hoodi-pebbly-notemp-50f47346
        depends_on:
            op-init:
                condition: service_completed_successfully
        entrypoint: []
        command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f '/geth/geth' ]; then
                echo 'Initializing geth data directory with genesis block...'

                # Use genesis file from op-init
                if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
                  echo 'ERROR: Failed to initialize geth with genesis block'
                  exit 1
                fi
                echo 'Geth initialized successfully with genesis block'
              else
                echo 'Geth data directory already initialized, skipping initialization'
              fi
        volumes:
            - op_geth_data:/geth
    op-geth:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-pebble-nobitemporality-test-hoodi-pebbly-notemp-50f47346
        restart: unless-stopped
        stop_grace_period: 5m
        depends_on:
            op-geth-init:
                condition: service_completed_successfully
        command:
            - --networkid=60138453097
            - --datadir=/geth
            - --http
            - --http.corsdomain=*
            - --http.vhosts=*
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.origins=*
            - --ws.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --syncmode=snap
            - --authrpc.vhosts=*
            - --authrpc.addr=0.0.0.0
            - --authrpc.port=8551
            - --authrpc.jwtsecret=/jwt/jwt
            - --usb=false
            - --state.scheme=hash
            - --nat=none
            - --bootnodes=enode://debeb08742c8d36d1795027dec3521d91aaad473371dbfe2b0665e39a240ddc1f1a64e2515d4925529f7e598db38ff8edcba6330471e1b4630c484dc50e524eb@57.130.8.252:46072,enode://998bc5939b39f67dc6ffb57fb8c5bfb225b908f4aff066662a6c42d9cff879a4ed1c40901caaaf3f4e830756307d53f7ee36a74368cc71767a63568b06e0e684@57.130.8.174:46074,enode://1bd51d818b7ed9008bfff63146b9b2b209d809d46d684aa561a84e0f3fd17801949c668e9dc5ddd99f794bbf432959996470b0f407633526fcb99c83bbe7a7ee@57.130.8.112:46076,enode://32a64ed50ea268a51754ac5e8a82bb77e48bb707c3b703b8227f483d146d4bcac768c7434e2bcf7ca32efac6b5cefb7116932fa58466a938617a73394a6889e8@57.130.9.134:46078,enode://af7e88d820e32497d86a38f01e4957fea3c8a3257c6eb28b5aa938b51e9296777c444be82a885fcdf9ebd596a4009b39810606d3c2122d9ef251b71fa0376f4a@57.130.8.167:46080
            - --txpool.disable.non.golembase.transactions=true
        ports:
            - 8545:8545
