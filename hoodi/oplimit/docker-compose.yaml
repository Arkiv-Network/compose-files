volumes:
    op_geth_data:
    op_node_data:
    jwt_shared:
services:
    # ========================================
    # OPTIMISM NODE SERVICES
    # ========================================
    op-init:
        image: alpine:latest
        command:
            - sh
            - -c
            - |
              set -e

              # Create config directory
              mkdir -p /config

              # Generate JWT secret if it doesn't exist
              if [ ! -f '/jwt/jwt' ]; then
                echo 'Generating JWT secret'
                mkdir -p /jwt
                # Generate a 32-byte random hex string for JWT secret
                apk add --no-cache openssl
                openssl rand -hex 32 > /jwt/jwt
                chmod 666 /jwt/jwt
                echo 'JWT secret generated successfully'
              else
                echo 'JWT secret already exists, skipping generation'
              fi
        volumes:
            - op_node_data:/op-node
            - jwt_shared:/jwt
    op-geth-init:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-hoodi-oplimit-e5874362
        depends_on:
            op-init:
                condition: service_completed_successfully
        entrypoint: []
        command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f '/geth/geth' ]; then
                echo 'Initializing geth data directory with genesis block...'

                # Use genesis file from op-init
                if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
                  echo 'ERROR: Failed to initialize geth with genesis block'
                  exit 1
                fi
                echo 'Geth initialized successfully with genesis block'
              else
                echo 'Geth data directory already initialized, skipping initialization'
              fi
        volumes:
            - op_geth_data:/geth
    op-geth:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-hoodi-oplimit-e5874362
        restart: unless-stopped
        stop_grace_period: 5m
        depends_on:
            op-geth-init:
                condition: service_completed_successfully
        command:
            - --networkid=60138453077
            - --datadir=/geth
            - --http
            - --http.corsdomain=*
            - --http.vhosts=*
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.origins=*
            - --ws.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --syncmode=snap
            - --authrpc.vhosts=*
            - --authrpc.addr=0.0.0.0
            - --authrpc.port=8551
            - --authrpc.jwtsecret=/jwt/jwt
            - --usb=false
            - --state.scheme=hash
            - --nat=none
            - --bootnodes=enode://8257050b2d03c55b73728fc353cc8b2e1a18b3fbb530b2879f8f8334f99d2094a5d3d39fe9f256b7d7dc6264d9d320dcf8e81c09052a546632c5e11325b43618@57.130.9.134:46084,enode://828c3656a1fc0431138122ff5e61b98e6db8530fae1eab4d37685b929f219e55d9e517e4bef838b2ff6e52e22a4834ab9d5fd3b6f325b5aecd8db2778dce2e0e@57.130.8.252:46086,enode://a8c3009cd44eef0e2d69f49c5abfa5af898e0175290566811ec3641a0ea43904c36cd602c6119497cc783f371bc0516892ac80c77aec8b392d4194e47f0691f4@57.130.8.167:46088,enode://14bc7821c9190e3a411d0d4c3cfdbcafa61892b05eab22b35ae310a4c0ae0500ffd0abdf390226b786a1b0bf37dfa5caf8cbe293cbbb77925a6d493be3f2bf31@57.130.8.174:46090,enode://843d86b4586723d61dc62f4f6766a93c815b47006bb9d748a06005041b09580edf83594d17bc489bda2c393eb2c4bb2aca2cd75815f18729477d5b08f584f69b@57.130.15.24:46092
            - --txpool.disable.non.golembase.transactions=true
        ports:
            - 8545:8545
            - 8546:8546
        volumes:
            - op_geth_data:/geth
            - jwt_shared:/jwt
    op-node:
        image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-oplimit-1e1718a7
        restart: unless-stopped
        stop_grace_period: 5m
        depends_on:
