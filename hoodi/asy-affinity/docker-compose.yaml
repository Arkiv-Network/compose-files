volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-affinity-979199bd
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-affinity-979199bd
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453100
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://a25f3d9c550921f1ae32d9e3f3baafe4484259c916ec802980741a8d88bfb01abd41867a3fd1f063bfefe6c13524de1435da60dcf03324dbc5699b2568b66099@57.130.8.167:46072,enode://44e8c10db378d68fe93c2642b0b2cbcf2fd4847ddbb3b71670dd3526aa99b530abdfc02dd6ba108fda422c8972924ec918b5e8fc619d1d076c323994d4f8299c@57.130.9.134:46074,enode://b55226a2961db0e80ce3b8f626a3f5e6566946615f0f97462eef1383f9ee128be4e8ebb6cab531b4ee53561a67e63442e91121af62101d2b3421823860399cb0@57.130.8.252:46076,enode://20d29cb46f7d08345fee2e6fb581d8a85c991ceff0bc1a7917b5bf8a9b87f687520b0351540b27ccf2b0b6922c7af04cce30cbadd5edac2aab790e9df9a99c4f@57.130.15.24:46078,enode://dbd7aad82ace8877a8c08faf79e981a4e20d34e5f38257e0bd1c3192977733d9671d969c83c4e6c5d1e2ce09505c217f93ef9ad7deb788fd9464773b4cb901ca@57.130.8.174:46080
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-asy-affinity-d42c7d70
