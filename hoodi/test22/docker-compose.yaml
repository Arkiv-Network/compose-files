volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-test22-fdaab8b3
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-test22-fdaab8b3
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453099
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://9a2d679bd6a0cff472c212a7982c85f1034f698a3cc17baa0c1176ed6602ea6cc001992860377258f76f0a7d1a21faf231a0818c74291c8150934623a020f5da@57.130.8.252:46108,enode://a43c74ccf0fda7bcfdc33f9e610e3dabb410103b4c2b7460add36a43f26d3f9fddc08ed5ed6afec92eed43d112d8b3bb41e23de41e6e162f8c107622f14fba03@57.130.8.167:46110,enode://5ff14d62a5a871e1b3f9ef2c1b71994b82c6da9dde7c183225c96c74c2b661ac7c13259435477166b986b15eb49ff34d1b697339854ec3fb37ea1fa5c029e16f@57.130.8.167:46112,enode://c8b67575634f720d494476f69e1c37130b4fbb2c745a11fa89a44b3fb6ef2e2551390dd830785ccc39fe14c8d8f8362af82077d13207047a0abb2f9bd8ff6c3f@57.130.8.174:46114,enode://28741e4cc13cad095cb63f794db027230bc2520ad3733b3b2ca5d17245c9845c7dc75a58b5295c26f672783763fd4121f8498b7a7797a01fef7d15b7d124932a@57.130.8.252:46116
