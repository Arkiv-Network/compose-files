volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-pr-65-2b77395f
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-pr-65-2b77395f
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453094
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://8aa12c92d49417b94b7f4daec97837d00d4c2deffb04f1696cf1c05e28574af87ec3c50f15b531de0d663bbc7d95b58417182b29b959d55dbd1ec86017f177e7@57.130.8.167:46108,enode://8f5bc2ad540c15e57afba2afddc3df05a6229348752e6cd3e4bb7666252107835dbf8c2390609068875bc74ed299b5a421fd78e6d15d3aeffaa40eaf9fbecc27@57.130.15.24:46110,enode://c011fc973166487485c06076f7cfa5abea01e6d6722fb1caaa406901425ed1314d3511a2818d26fd8739d115d5e2d45a1df0ee93293dbdab916ab8da119b7bbf@57.130.9.134:46112,enode://93ca5118610e134c4efc303bdc5548d9851be147765358aca06509d441970bd03413ba247c0590ddd1c959dd7b5e857dce508a7a120401319fe09af41d72cfe7@57.130.8.252:46114,enode://a27c54618a899e7b04d27aa6cff2aa233c6c215c4766ac8e51b360aaf08e57975f0f80c115c0d74648351221bbaa857e5a3bc79892ad5d872c33de432544ae1c@57.130.8.174:46116
