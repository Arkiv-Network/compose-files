volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-celestia2-d50efc21
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-celestia2-d50efc21
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453094
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://de49b9c5ba68d92b4edc1606dd3179caf43aa5ee6cb5d933e5b1f4b1d0d03d3e5dbdf72dd471ae9aee65e5f7991f21730fd82dc43c2cd27cee8f46b6ef0440d8@57.130.8.167:46120,enode://a84db84f64a5c122cb59ab7ed2658c503ea4b0fba7487de94b7ed1923048dabdbcbaf6a66870c0feb3596b4ea3987bb48708b888bd985c1b4804247645d1ef9e@57.130.15.24:46122,enode://8ce7b2cae8901474e0b8f083388a431ef997aec06f581b4a863d80d38e784f1b07afe2a939ad856cf97c4ef232ded12cac5a9d8dc63ec51131c3cf14d3af65da@57.130.8.167:46124,enode://7de87d935a3c1ab08ad740b2f5aed47f4b7f106b4614db980820f6f020a9c6423b19e7f17056f42bddd884986e587a90139b1014684d28637b42b77b81d59faf@57.130.8.252:46126,enode://888bcf08588e14a201f8c95de78dedf43407bf1f79551127fa86924839a016f88793977dfedf441c6c9742e3928912f2c2436d710ec6e871d635973324146d7b@57.130.8.174:46128
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-asy-celestia2-6cfda80c
    restart: unless-stopped
