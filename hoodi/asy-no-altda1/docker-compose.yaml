volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-no-altda1-71673aba
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-asy-no-altda1-71673aba
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453094
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://3e964540c4b002777aee0fc9d4eef428e74d193563cba432012b84f607865654d30d374cfb822140647591be92e748c32763c4cfb781ac5f59670dc5a91b3a1a@57.130.8.174:46084,enode://e8b921c86f7859f598d0703f7426d865d3b5f72a6e18e0fc84c82a3261a7b74e4708028971bb91abb6c9d31aae46577d86ff16cbb245114d9640b2cf5a08ea0c@57.130.9.134:46086,enode://c49e55c8717bc7b396390b4279928155bdef5bcebf3694b858d6845d8402a8543414b7c29b87422b96b624090463b4881a87dba3d4e472f8764e7aa96000ee1f@57.130.8.252:46088,enode://98270cda7e09238b6c3dbf0e75d74d6a6c29b279b78742191cfbde61e4f03eaf3eb0d2add885c40d1eef74619943f22dba017313b63fb79d4575f24d1ef9592b@57.130.8.167:46090,enode://8c7c32f11cc24b0768d12f50005312d882a71ef04759cad90b38d4ff1540bec58bf479f48a9bbcdf1cf705ebb78e8bcdacf76bcbaec94ccc32fa67408daf7438@57.130.15.24:46092
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-asy-no-altda1-9f81ff33
