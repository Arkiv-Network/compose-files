volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-zeppelin-6f228b8b
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-zeppelin-6f228b8b
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=2274637596
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://ebe007a6c091be470d18b973b0e55242e2fce4697cb13357a57827609fd141f21982058be985bbaff9acb24201ea3ee31b3e4e8f64ba639c08a0186b5bd64d9f@195.201.165.105:30060,enode://12479900ef35f5e303845bddc0bec620cab6615dc2454ba997523b1f75abba89af3ae31ee8ad0a64def774ca0018652681eb77fab81e7e201ed2eefd352675dd@195.201.165.105:30062,enode://bda12baab9f8d963c572b149561bf73af42c26c3ba16bec0368c7d28302e7e4e38488f43e39a879055e675185676bc044ef8c191d9c61b64fff6bea91c172abd@195.201.165.105:30064,enode://d7e5bd5815aba47684f3ac22ab72d54385443cbbd89c0455498daf3a71e9ffa33208621945ca9ae4359175ff40ff75306e42adf1439e2f40d9ae4d54aaa07bcb@195.201.165.105:30066,enode://d1871dfd77ad9fa2878d28944004f1c057cb6a72b99bfc09d68926b85a9f572015b16bf8027fc164cdddfe2e469f3dafb653e087689f4bb15c8dc5c99f7e604e@195.201.165.105:30068
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-zeppelin-c96bb50f
    restart: unless-stopped
    stop_grace_period: 5m
