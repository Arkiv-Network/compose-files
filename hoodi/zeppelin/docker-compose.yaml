volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-zeppelin-bca1fc0e
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-zeppelin-bca1fc0e
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=13
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://906a0e5cf8a7d7e91c0d6dd42b88d0fd705b3b073b5630be55f4cdcc9d59ce7c9573290797d94e22f6fa232a82cb090c77186d18367a74929d24647b859a40d7@195.201.165.105:30060,enode://79be609e39b10139e14b6ca9b6efe5d016eeae96bd0be75b92cb7d70144832a77920744d3e51e9014e8bdd83d098f2a614ca69aed8de10a165fd97b34cd377d6@195.201.165.105:30062,enode://f3d2363afe810d36bd2886104849c4031993c49743086da413ec3f98d3dba6ad476d79ae02dabd3fe7a72eb200b98ec8e9a948bf2c8a6fadd119aac5eb9dee4d@195.201.165.105:30064,enode://f1e2b6cc0ec63ff6b2ee059b58b2811668dbff746d9a83f1ce6386f058ead096f43935b7d0854d2ee1dd3d039d85ad00675f6911747d9990283ca3b2b363f5e9@195.201.165.105:30066,enode://0b2c70837094c77b54dfb6863193af4941d2d95b6537cdda0926968d505d4cee71e653a1624bd0f56045823d91962370c9088eba5b98af93b7de5f6f244a2cfa@195.201.165.105:30068
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-zeppelin-431bbde4
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
