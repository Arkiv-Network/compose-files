        volumes:
            - jwt_shared:/jwt
            - op_node_data:/op-node
    altai:
        image: golemnetwork/altai:v2
        restart: unless-stopped
        ports:
            - 3100:3100
        command:
            - --addr=0.0.0.0
            - --port=3100
            - --backends=http
            - --http.endpoint=https://darkiv.network
            - --base-network=hoodi
            - --network=pebbly
            - --log.level=info
