volumes:
    op_geth_data:
    op_node_data:
    jwt_shared:
services:
    # ========================================
    # OPTIMISM NODE SERVICES
    # ========================================
    op-init:
        image: alpine:latest
        command:
            - sh
            - -c
            - |
              set -e

              # Create config directory
              mkdir -p /config

              # Generate JWT secret if it doesn't exist
              if [ ! -f '/jwt/jwt' ]; then
                echo 'Generating JWT secret'
                mkdir -p /jwt
                # Generate a 32-byte random hex string for JWT secret
                apk add --no-cache openssl
                openssl rand -hex 32 > /jwt/jwt
                chmod 666 /jwt/jwt
                echo 'JWT secret generated successfully'
              else
                echo 'JWT secret already exists, skipping generation'
              fi
        volumes:
            - op_node_data:/op-node
            - jwt_shared:/jwt
    op-geth-init:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-pebble-test-hoodi-pebbly-874a2311
        depends_on:
            op-init:
                condition: service_completed_successfully
        entrypoint: []
        command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f '/geth/geth' ]; then
                echo 'Initializing geth data directory with genesis block...'

                # Use genesis file from op-init
                if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
                  echo 'ERROR: Failed to initialize geth with genesis block'
                  exit 1
                fi
                echo 'Geth initialized successfully with genesis block'
              else
                echo 'Geth data directory already initialized, skipping initialization'
              fi
        volumes:
            - op_geth_data:/geth
    op-geth:
        image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.7-pebble-test-hoodi-pebbly-874a2311
        restart: unless-stopped
        stop_grace_period: 5m
        depends_on:
            op-geth-init:
                condition: service_completed_successfully
        command:
            - --networkid=60138453096
            - --datadir=/geth
            - --http
            - --http.corsdomain=*
            - --http.vhosts=*
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.origins=*
            - --ws.api=admin,debug,eth,txpool,net,engine,web3,golembase,txpool,arkiv
            - --syncmode=snap
            - --authrpc.vhosts=*
            - --authrpc.addr=0.0.0.0
            - --authrpc.port=8551
            - --authrpc.jwtsecret=/jwt/jwt
            - --usb=false
            - --state.scheme=hash
            - --nat=none
            - --bootnodes=enode://890b66b83686aecf400ffb780e806e78e39fec36a6cc844eeaa69997585eb60d10d97155df6ce7489d27aa173badd0d8fe05128b0ff0b08e2a1e7b76c7e39748@57.130.8.167:46132,enode://1468025d281abb403dfa6740f31f44530e0334ca8c93b5a4e74459c7fc44cd1a842534cd4a6a25042d2a683c88964144309c6235e7340800db400309f8c42b57@57.130.8.112:46134,enode://54a6f0600fa755f642fb3ffb25bc6f4a20489767f39b29c08a5dc19f24f7dd8408494a600119119b68d67027ab40e1472cc4f90c1bfa49a0593aea3de752c260@57.130.8.252:46136,enode://f57cd2a372b15f1f0df3088e87439562b7ee66165ec7a8d18f366bc8dd1369e950a4bb428cd5f163c82946d5a03bcdf262dba933ee49f63ddeb9b9d2c6b63016@57.130.15.24:46138,enode://7b9f32f985843a31ec743e07ffa22a64b3b02fb9d2593cef67b7f13f50dd74a0f3f83cced8f2da03a60991b0b66bffcbb3a0c2189f3358534203d43cd3287127@57.130.9.134:46140
            - --txpool.disable.non.golembase.transactions=true
        ports:
            - 8545:8545
            - 8546:8546
        volumes:
            - op_geth_data:/geth
            - jwt_shared:/jwt
    op-node:
