volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-mc-affinity-aa317629
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-1.2-hoodi-mc-affinity-aa317629
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=17
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://28a4c628f24b2efb9f8d86698adeb979ef3713d6d021b865ef8fcde9fde0b5154c97a14d4cfc369fb850a68a69e76b19a2ea5f4310fbeb04f815354da35cbe10@195.201.165.105:30072,enode://438ad7ad5ad801c210c5329d255b084d62c7146ea82bd334e07b82bea6ed3e30aa64425de81556878c626c924ccdd449fea6a5a1ac95113a434690d20b471795@195.201.165.105:30074,enode://78e930032e819c71a7b7d37d9a7031d08437d46e73128855eaf182ed95509e680e95ed143fe8a1cf6ff86c52ee10ee024593beeea4a86c97729f8fb54ee96df6@195.201.165.105:30076,enode://3a40607aecc3d7692ba092ec37273532179acf30fdcd917bc54531324928b43a19f5339d87b9d3ff77de235994b7d4dec52e27566b56cd130e2d563acd044ebe@195.201.165.105:30078,enode://a311be59fd79d7d8dfee6f4b276c3bfe474f72ddb4e53d02741d52542a38356a9f7e2f266cba744207fc19e38134ba1dc840ff374f9b0753574d6d6a187c6540@195.201.165.105:30080
    - --txpool.disable.non.golembase.transactions=true
    ports:
    - 8545:8545
    - 8546:8546
    volumes:
    - op_geth_data:/geth
    - jwt_shared:/jwt
  op-node:
    image: golemnetwork/golembase-l3-op-node:v1.16.2-hoodi-mc-affinity-a8e86908
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
