volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-mc-affinity-2-885ca034
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-mc-affinity-2-885ca034
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453101
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://c138d872d5acdfbc887e97ae1e2cdd909b18a1cfa4f8d10d04c9219d3e151d621f7cbff65effdc958beb10213fb804059c4ef0c72e3bb38c3bd14aa4648cad43@57.130.8.252:46096,enode://e04c03709ee88707197bf46a7822a7288d31de77e7b56f7bd3089918ffcb99f246b91c7b7dead1a00fc6b25ac70894591b6ad631f6401ce235b44e3015ad4d4d@57.130.8.174:46098,enode://e961967d70a37ea66a6f49914bbc7dd76b22449cdc8b1d311cd4bbfc8237fe78a2444a824ad70d1fea055c5a27059dd96c417429067e645063bf1fe70cec659d@57.130.9.134:46100,enode://24d8c8c658f9d392e73a7c666257e38bec57e86f81a47544a481b5419e2098313fe9fdd630576650788025be7fab7cf43bfb96df9e7c73da04d7fca40cfc0406@57.130.15.24:46102,enode://593e8eb5ccd929033da69683fdf4ebeab5e599c0a55e3b7f4432ad4e4871a929a7c34c1b54579e21de6568d104639cb1764394b0b338d833e7e04caf13d50721@57.130.8.167:46104
