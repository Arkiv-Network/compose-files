volumes:
  op_geth_data: {}
  op_node_data: {}
  jwt_shared: {}
services:
  op-init:
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      # Create config directory
      mkdir -p /config

      # Generate JWT secret if it doesn't exist
      if [ ! -f '/jwt/jwt' ]; then
        echo 'Generating JWT secret'
        mkdir -p /jwt
        # Generate a 32-byte random hex string for JWT secret
        apk add --no-cache openssl
        openssl rand -hex 32 > /jwt/jwt
        chmod 666 /jwt/jwt
        echo 'JWT secret generated successfully'
      else
        echo 'JWT secret already exists, skipping generation'
      fi
    volumes:
    - op_node_data:/op-node
    - jwt_shared:/jwt
  op-geth-init:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-wrkr-3bb0bfcc
    depends_on:
      op-init:
        condition: service_completed_successfully
    entrypoint: []
    command:
    - /bin/sh
    - -c
    - |
      set -euo pipefail

      if [ ! -f '/geth/geth' ]; then
        echo 'Initializing geth data directory with genesis block...'

        # Use genesis file from op-init
        if ! geth init --state.scheme=hash --datadir='/geth' '/genesis.json'; then
          echo 'ERROR: Failed to initialize geth with genesis block'
          exit 1
        fi
        echo 'Geth initialized successfully with genesis block'
      else
        echo 'Geth data directory already initialized, skipping initialization'
      fi
    volumes:
    - op_geth_data:/geth
  op-geth:
    image: golemnetwork/golembase-l3-op-geth:v1.101605.0-2.1-hoodi-asy-wrkr-3bb0bfcc
    restart: unless-stopped
    stop_grace_period: 5m
    depends_on:
      op-geth-init:
        condition: service_completed_successfully
    command:
    - --networkid=60138453099
    - --datadir=/geth
    - --http
    - --http.corsdomain=*
    - --http.vhosts=*
    - --http.addr=0.0.0.0
    - --http.port=8545
    - --http.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --ws
    - --ws.addr=0.0.0.0
    - --ws.port=8546
    - --ws.origins=*
    - --ws.api=admin,debug,eth,txpool,net,engine,web3,arkiv,txpool
    - --syncmode=snap
    - --authrpc.vhosts=*
    - --authrpc.addr=0.0.0.0
    - --authrpc.port=8551
    - --authrpc.jwtsecret=/jwt/jwt
    - --usb=false
    - --state.scheme=hash
    - --nat=none
    - --bootnodes=enode://9018d0bef6f872dc8a98d7d5fa120ba2a14c8105c462b2ac526f5c5a024c9023e2311fb4c3529f69be388333bf13e277a1857d0b09409b7aac1cf5bb20994adf@57.130.9.134:46096,enode://1ff23e0e6503d29cec9a53dd43b2b5f1d836e9057f1b31c00bf83dc255dcd320fc59768fa0d6274cca67a16b62aeb0cfb22e06a89613cc1bc4c4b2b99338f071@57.130.8.174:46098,enode://7567bc01b9bea810ceb101932badbc208a119f8ddb02ac9c695017ecdd67c6670037c144a00debcf3e4b73b4dd7dffaca5aeaa81fcd93b9c262c8a3a23682a09@57.130.8.252:46100,enode://85e049472c554b84f619d0fd138a634aa8892158e035ccb3b5f1170bb9b4fb8adb4702b78f9188f7c2b2be557b6793c95f4b1f12df41d01d32263c0a7fb09f48@57.130.15.24:46102,enode://5af822fd4d3344bb198765366820507fc4549b6b03713d4824853609b9be5eee72ff607e2d6d85d50e8e28cfb972f7d1a3024e626a14572ac6b530add032e8a7@57.130.8.167:46104
